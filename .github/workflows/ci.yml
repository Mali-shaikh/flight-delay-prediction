name: CI/CD Pipeline — Flight Delay Prediction

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Code Quality (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 src/ api/ etl/ monitoring/ --max-line-length=100 --ignore=E203,W503

  # ── Job 2: Test ──────────────────────────────────────────────────────────────
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create sample data & train model
        run: |
          python -c "
          from etl.extract import extract
          from etl.transform import transform
          from etl.load import load
          raw = extract(use_sample=True, n_sample=5000)
          processed = transform(raw)
          load(processed)
          "
          python src/train.py

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=src --cov=api --cov=etl --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
        continue-on-error: true

  # ── Job 3: Docker Build ───────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t flight-delay-api:${{ github.sha }} .

      - name: Run Docker container test
        run: |
          docker run -d --name test-api -p 8000:8000 flight-delay-api:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop test-api
